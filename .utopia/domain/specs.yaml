id: specs
title: Specification System
bounded_context: specs
description: |
  Living documentation of what the system does now.
  Specs are derived artifacts - they are updated when CRs are merged, not manually edited.
  They capture features, acceptance criteria, and domain knowledge.

  Bounded Context Scope: This context owns the definition of current system state -
  what features exist, their acceptance criteria, and domain knowledge. It does NOT
  own how changes are proposed (that's change-requests) or how they're implemented
  (that's execution).

terms:
  - term: Spec
    canonical: true
    code_usage: "internal/domain/spec.go - Spec struct; .utopia/specs/*.yaml files"
    definition: A specification document with ID, Title, Description, Created/Updated timestamps, containing features and domain knowledge
    aliases:
      - specification
      - spec document
      - feature spec

  - term: Feature
    canonical: true
    code_usage: "internal/domain/spec.go - Feature struct; nested within Spec.Features array"
    definition: A capability within a spec, identified by unique ID, with description and acceptance criteria
    aliases:
      - capability
      - spec feature

  - term: AcceptanceCriteria
    canonical: true
    code_usage: "internal/domain/spec.go - Feature.AcceptanceCriteria field ([]string)"
    definition: Conditions that must be met for a feature to be considered complete and correct
    aliases:
      - AC
      - criteria
      - acceptance conditions

  - term: DomainKnowledge
    canonical: true
    code_usage: "internal/domain/spec.go - Spec.DomainKnowledge field ([]string)"
    definition: Array of strings capturing domain understanding that informs implementation but isn't a testable feature
    aliases:
      - domain info
      - context
      - background knowledge

  - term: Spec Operations
    canonical: true
    code_usage: "internal/domain/spec.go - ChangeOperation type; used in Change.Operation field"
    definition: Changes that can be applied to specs - add (new feature/knowledge), modify (existing feature), remove (feature/knowledge), delete-spec (entire spec)
    aliases:
      - operations
      - spec changes

  - term: Living Documentation
    canonical: true
    code_usage: "Conceptual pattern - specs auto-update when CRs merge via /complete command"
    definition: Specs are continuously updated as CRs merge, always reflecting current system state rather than historical intent
    aliases:
      - living docs
      - current state docs

entities:
  - name: Spec
    relationships:
      - type: contains
        target: Feature
      - type: contains
        target: DomainKnowledge
      - type: updated-by
        target: ChangeRequest

  - name: Feature
    relationships:
      - type: belongs-to
        target: Spec
      - type: contains
        target: AcceptanceCriteria
      - type: modified-by
        target: Change

  - name: DomainKnowledge
    relationships:
      - type: belongs-to
        target: Spec
