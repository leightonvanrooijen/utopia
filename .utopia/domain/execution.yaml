id: execution
title: Execution System (Ralph)
bounded_context: execution
description: |
  Executes WorkItems through iterative Claude interactions using the Ralph Wiggum loop.
  Each iteration gets fresh context, with verification feedback driving retries.
  Named after the "Ralph Wiggum" pattern of persistent, iterative attempts.

  Bounded Context Scope: This context owns the execution lifecycle - how work items
  are processed, iterated, retried, and verified. It does NOT own the definition
  of what work should be done (that's change-requests) or what the work validates
  against (that's specs).

terms:
  - term: WorkItem
    definition: Discrete unit of executable work with ID, SpecRef, Title, Status, Prompt, Constraints, Order, Dependencies, and Complexity
    aliases:
      - work item
      - task
      - execution unit
    cross_context_note: |
      The alias "task" in this context means any executable work unit. In the
      change-requests context, Task is a distinct entity type for refactor/bugfix
      work that has no spec impact. When discussing "tasks", clarify context.

  - term: WorkItemStatus
    definition: Execution state of a work item - pending (not started), in_progress (executing), completed (verified), failed (max iterations exceeded)
    aliases:
      - status
      - execution status
    cross_context_note: |
      "Status" in this context tracks execution lifecycle. Other contexts have
      their own status concepts: ChangeRequestStatus (change-requests) and
      ADRStatus (adrs) with different lifecycle states.

  - term: Complexity
    definition: Estimated effort level for a work item - low, medium, high - affects iteration limits
    aliases:
      - work complexity
      - effort level

  - term: Iteration
    definition: A single pass through Claude with fresh context, including the work item prompt and any failure feedback
    aliases:
      - execution iteration
      - attempt
      - try

  - term: IterationCount
    definition: Number of retry attempts made for a work item, tracked to enforce max_iterations limit
    aliases:
      - retry count
      - attempt count

  - term: LastFailureOutput
    definition: Verification failure message from the previous iteration, injected into the next iteration's context (not accumulated)
    aliases:
      - failure output
      - error feedback
      - verification failure

  - term: COMPLETE token
    definition: Special marker (<COMPLETE>) that Claude outputs to signal intentional completion, distinguishing from step-limit exits
    aliases:
      - completion token
      - done marker

  - term: Ralph Wiggum Loop
    definition: The iterative execution pattern where work items are retried with fresh context and failure feedback until verification passes or max iterations reached
    aliases:
      - ralph loop
      - execution loop
      - retry loop

  - term: Fresh Context
    definition: Each iteration starts with a clean context containing only the work item prompt, constraints, and last failure output - no accumulated history
    aliases:
      - clean context
      - reset context

entities:
  - name: WorkItem
    relationships:
      - type: derived-from
        target: ChangeRequest
      - type: references
        target: Spec
      - type: verified-by
        target: VerificationResult
      - type: depends-on
        target: WorkItem

  - name: Iteration
    relationships:
      - type: executes
        target: WorkItem
      - type: produces
        target: VerificationResult
      - type: receives
        target: LastFailureOutput

  - name: ExecutionLoop
    relationships:
      - type: processes
        target: WorkItem
      - type: uses
        target: VerificationCommand
