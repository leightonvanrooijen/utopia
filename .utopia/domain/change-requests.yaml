id: change-requests
title: Change Request System
bounded_context: change-requests
description: |
  The unified system where all work flows through Change Requests (CRs).
  CRs are standalone documents that target different specs, enabling cross-cutting changes.
  They describe intended work, not current state (which is captured in specs).

  Bounded Context Scope: This context owns work definition - what changes should be made,
  how they're structured (Changes, Tasks, Phases), and their lifecycle from draft to
  complete. It does NOT own how work is executed (that's execution) or what the final
  state should look like (that's specs).

terms:
  - term: Change Request
    definition: Core document describing intended work with ID, Type, Title, Status, and Changes/Tasks/Phases
    aliases:
      - CR
      - change request
      - work request

  - term: CRType
    definition: Classification of change request - feature (new capability), enhancement (modify existing), refactor (behavior-preserving), removal (delete capability), initiative (multi-phase), bugfix (correct to match spec)
    aliases:
      - CR type
      - change request type
      - type

  - term: ChangeRequestStatus
    definition: Lifecycle state of a CR - draft (being defined), in-progress (being executed), complete (merged)
    aliases:
      - CR status
      - status
    cross_context_note: |
      "Status" in this context tracks CR lifecycle. Other contexts have their own
      status concepts: WorkItemStatus (execution) and ADRStatus (adrs) with
      different lifecycle states.

  - term: Change
    definition: A single operation within a CR that modifies a spec - add (new feature/knowledge), modify (existing feature), remove (feature/knowledge), delete-spec (entire spec)
    aliases:
      - spec change
      - feature change

  - term: Task
    definition: A unit of work for refactor/bugfix CRs that has no spec impact - contains description and acceptance criteria
    aliases:
      - refactor task
      - bugfix task
    cross_context_note: |
      Task in this context is a specific entity type for work that doesn't modify specs.
      In the execution context, "task" is used informally as an alias for WorkItem
      (any executable work unit). When discussing "tasks", clarify context.

  - term: Phase
    definition: An ordered stage within an initiative CR, containing tasks or changes with execution dependencies
    aliases:
      - initiative phase
      - execution phase

  - term: spec_ref
    definition: Field identifying the target specification that a change applies to
    aliases:
      - spec
      - spec reference
      - target spec

  - term: Initiative
    definition: A complex CR type with ordered phases and dependencies, used for large cross-cutting work
    aliases:
      - initiative CR
      - multi-phase CR

entities:
  - name: ChangeRequest
    relationships:
      - type: targets
        target: Spec
      - type: produces
        target: WorkItem
      - type: contains
        target: Change
      - type: contains
        target: Task
      - type: contains
        target: Phase

  - name: Change
    relationships:
      - type: targets
        target: Spec
      - type: modifies
        target: Feature

  - name: Task
    relationships:
      - type: references
        target: Spec

  - name: Phase
    relationships:
      - type: contains
        target: Change
      - type: contains
        target: Task
      - type: depends-on
        target: Phase
