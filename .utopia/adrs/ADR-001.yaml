id: ADR-001
title: "Use Claude's Native Session Storage for Transcript Capture"
status: accepted
date: 2026-02-17
context: |
  Utopia needs to capture conversation transcripts from Claude CLI sessions
  for later analysis (e.g., extracting ADRs, reviewing decisions).

  The original approach used PTY (pseudo-terminal) output capture, which
  captured the raw terminal output during Claude sessions. This resulted in
  transcripts polluted with:
  - ANSI escape codes for colors and formatting
  - Terminal redraw sequences from Claude's TUI
  - Cursor positioning commands
  - Other terminal control characters

  These artifacts made transcripts difficult to parse and analyze programmatically.
  The team needed a cleaner source of conversation data.

decision: |
  We will read transcripts from Claude's native session storage at
  ~/.claude/projects/{encoded-path}/ instead of capturing PTY output.

  Implementation approach:
  - Generate a unique session ID before starting Claude
  - Pass the session ID to Claude CLI via --session-id flag
  - After the session ends, read the JSONL transcript file from Claude's storage
  - Parse user/assistant messages with clear separation
  - Capture tool calls by name (e.g., "[Tool: Read]")

options_considered:
  - option: "PTY output capture"
    pros:
      - No dependency on Claude's internal storage format
      - Works regardless of Claude CLI version or storage changes
      - Captures exactly what the user saw
    cons:
      - Output contains ANSI escape codes and terminal artifacts
      - Requires complex parsing to extract clean text
      - Terminal redraw sequences create duplicate/corrupted content
      - Brittle to changes in Claude's TUI rendering

  - option: "Claude's native session storage (chosen)"
    pros:
      - Clean, structured JSONL format
      - No ANSI codes or terminal artifacts
      - Clear separation of user/assistant messages
      - Tool calls are explicitly labeled
      - Format is designed for programmatic access
    cons:
      - Depends on Claude CLI's --session-id flag existing
      - Depends on Claude's storage path encoding scheme
      - Coupling to Claude's internal implementation details
      - Storage format could change between Claude versions

  - option: "Pipe capture (non-TTY mode)"
    pros:
      - Simpler than PTY capture
      - No terminal escape codes in non-TTY mode
    cons:
      - Loses the full TUI experience during interactive sessions
      - User cannot see Claude's rich output while working
      - Poor developer experience

consequences:
  positive:
    - Transcripts are clean and immediately parseable
    - Eliminated entire category of ANSI parsing complexity
    - Reliable extraction of conversation structure
    - Full TUI experience preserved (direct stdin/stdout connection)
  negative:
    - Coupled to Claude CLI's session storage implementation
    - Must understand and match Claude's path encoding scheme
    - Bug discovered: path encoding mismatch caused empty transcripts (ADR-fix-transcript-path-encoding)
  neutral:
    - Requires generating and tracking session IDs
    - Reading happens after session ends (not real-time)

advice:
  - Understanding of Claude CLI's --session-id flag behavior
  - Analysis of Claude's JSONL storage format at ~/.claude/projects/

principles:
  - Prefer structured data over parsing unstructured output
  - Accept coupling when it significantly reduces complexity
  - Preserve user experience (TUI) while improving machine readability

