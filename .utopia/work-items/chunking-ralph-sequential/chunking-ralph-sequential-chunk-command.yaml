id: chunking-ralph-sequential-chunk-command
spec_ref: chunking-ralph-sequential.chunk-command
title: |
    Add CLI command to chunk a spec into WorkItems.
status: pending
prompt: |-
    ## TASK

    Add CLI command to chunk a spec into WorkItems.


    Acceptance criteria:
    - Command is "utopia chunk <spec-id>"
    - Command loads spec from .utopia/specs/<spec-id>.yaml
    - Command validates spec before chunking
    - Command saves WorkItems to .utopia/work-items/<spec-id>/
    - Command prints summary (N work items created)
    - Command fails with clear error if spec not found or invalid

    ## CONSTRAINTS

    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct


    ---

    When complete, commit your changes and output: <COMPLETE>
constraints:
    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct
