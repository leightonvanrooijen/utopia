title: Define the YAML structure for change request specs
status: completed
prompt: |-
    ## TASK

    Define the YAML structure for change request specs

    Acceptance criteria:
    - Change request has required fields: id, type, parent_spec, title, status, changes
    - type field is always 'change-request'
    - parent_spec references the id of an existing spec
    - status follows same values as regular specs (draft, approved, in-progress, complete)
    - changes is a list of operations

    ## CONSTRAINTS

    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct


    ---

    When complete, commit your changes and output: <COMPLETE>
