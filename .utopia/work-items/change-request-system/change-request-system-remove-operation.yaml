id: change-request-system-remove-operation
spec_ref: change-request-system.remove-operation
title: Remove features or domain knowledge from a spec
status: completed
prompt: |-
    ## TASK

    Remove features or domain knowledge from a spec

    Acceptance criteria:
    - operation field is 'remove'
    - For features, specifies feature_id to remove
    - feature_id must exist in parent spec
    - Can optionally include reason field for documentation
    - For domain_knowledge, provides list of exact strings to remove
    - domain_knowledge strings must match existing entries exactly

    ## CONSTRAINTS

    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct


    ---

    When complete, commit your changes and output: <COMPLETE>
constraints:
    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct
order: 3
estimated_complexity: medium
iteration_count: 1
