id: spec-tui-spec-file-watcher
spec_ref: spec-tui.spec-file-watcher
title: |
    Watch the spec file for changes and update the right pane.
status: pending
prompt: |-
    ## TASK

    Watch the spec file for changes and update the right pane.


    Acceptance criteria:
    - Monitors .utopia/specs/_drafts/<spec-id>.yaml for changes
    - Re-renders right pane within 100ms of file change
    - Handles file not existing yet (shows placeholder until created)
    - YAML content displayed with line numbers

    ## CONSTRAINTS

    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct


    ---

    When complete, commit your changes and output: <COMPLETE>
constraints:
    - Do not introduce new abstractions, interfaces, or packages
    - Do not refactor unrelated code
    - Architecture is already correct
order: 2
estimated_complexity: medium
