id: refactor-split-domain-spec
type: refactor
title: Split domain/spec.go (1087 lines) into focused files
status: draft
tasks:
  - id: extract-changerequest-types
    description: |
      Extract ChangeRequest, Phase, Task, and Change types to
      internal/domain/changerequest.go.

      These types form a cohesive unit separate from Spec.
    acceptance_criteria:
      - New file domain/changerequest.go created
      - ChangeRequest and related types moved
      - All CR validation methods moved with types
      - File is focused and cohesive (~200-300 lines)
      - All imports updated correctly

  - id: extract-documentation-types
    description: |
      Extract ADR, DomainDoc, ConceptDoc types to
      internal/domain/documentation.go.

      These knowledge artifact types are distinct from specs and CRs.
    acceptance_criteria:
      - New file domain/documentation.go created
      - ADR, DomainDoc, ConceptDoc types moved
      - Related methods and constants moved
      - File is focused (~150-200 lines)

  - id: extract-conversation-types
    description: |
      Extract Conversation, Signal, and related types to
      internal/domain/conversation.go.
    acceptance_criteria:
      - New file domain/conversation.go created
      - Conversation and Signal types moved
      - Conversation lifecycle methods moved
      - File is focused (~100-150 lines)

  - id: extract-validation-logic
    description: |
      Consider extracting validation logic to domain/validation.go
      if it makes the files more focused.
    acceptance_criteria:
      - Validation helpers consolidated if beneficial
      - ValidationError type in appropriate location
      - Code organization improves readability

  - id: slim-main-spec
    description: |
      After extractions, domain/spec.go should contain only
      Spec type, Feature type, and their core methods.
    acceptance_criteria:
      - domain/spec.go reduced to ~300-400 lines
      - File focused on Spec and Feature types
      - All domain logic still works correctly
      - Package maintains cohesion
