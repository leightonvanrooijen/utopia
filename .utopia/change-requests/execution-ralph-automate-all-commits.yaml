id: execution-ralph-automate-all-commits
type: enhancement
title: Automate all git commits in execution lifecycle
status: in-progress
changes:
    - operation: modify
      spec: execution-ralph
      feature_id: execute-command
      description: |
        Add explicit criteria for committing work items when generated and
        cleanup commit after CR completion. Ensures full git history of the
        entire CR lifecycle without requiring manual user commits.
      criteria:
        add:
            - 'After chunking generates WorkItems, stage and commit with message format ''chunk: <cr-id>'''
            - Chunk commit includes only the work item files generated by that chunk (not pre-existing items from other CRs)
            - After spec merge commit, create a cleanup commit that removes work items and CR file
            - 'Cleanup commit message format is ''cleanup: complete <cr-id>'''
            - Cleanup commit stages removal of .utopia/work-items/<spec-id>/ and .utopia/change-requests/<cr-id>.yaml
            - All commits are automated - user never needs to manually commit
