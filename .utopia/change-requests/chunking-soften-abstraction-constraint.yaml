id: chunking-soften-abstraction-constraint
type: enhancement
title: Soften abstraction constraint for features, keep strict for refactors
status: draft
changes:
  - operation: modify
    spec: chunking-ralph-sequential
    feature_id: default-constraints
    description: |
      Soften the abstraction constraint language for general use, allowing legitimate
      architectural work when needed. The strict version moves to refactor-specific constraints.
    criteria:
      edit:
        - old: Default constraints include "Do not introduce new abstractions, interfaces, or packages"
          new: Default constraints include "Prefer existing abstractions over creating new ones unless clearly required"

  - operation: modify
    spec: chunking-ralph-sequential
    feature_id: refactor-constraint-injection
    description: |
      Add strict abstraction constraint to refactor-specific constraints, ensuring
      refactors cannot change structure.
    criteria:
      add:
        - Refactor WorkItems include "Do not introduce new abstractions, interfaces, or packages"
