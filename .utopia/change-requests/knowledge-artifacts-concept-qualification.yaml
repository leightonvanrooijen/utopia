id: knowledge-artifacts-concept-qualification
type: enhancement
title: Define concept qualification criteria using Diataxis Explanation model
status: draft
notes: |
  Research sources:
  - Diátaxis Framework: https://diataxis.fr/explanation/
  - LinkedIn: https://www.linkedin.com/advice/0/what-best-practices-documenting-architecture-d8ncf

  Problem: Current signal-based detection ("why we chose...", "the trade-off is...")
  is too heuristic. A Concept should be understanding-oriented educational content,
  not just any discussion that mentions trade-offs.

  Solution: Adopt the Diátaxis "Explanation" model as the qualification framework.
  Concepts are understanding-oriented documentation that helps readers comprehend
  the "why" behind approaches, independent of any specific binding decision.

  Key distinction from ADRs:
  - ADR = "What binding decision did we make?" (point-in-time commitment)
  - Concept = "Why is this approach valuable in certain contexts?" (timeless understanding)

changes:
  - operation: add
    spec: knowledge-artifacts
    feature:
      id: concept-qualification-criteria
      description: |
        Criteria that define what qualifies as a Concept document, based on
        the Diátaxis framework's "Explanation" documentation type.
        A Concept is understanding-oriented educational content.
      acceptance_criteria:
        - "Qualification: content is understanding-oriented, not task-oriented"
        - "Qualification: content answers 'why' questions about approaches or trade-offs"
        - "Qualification: content has lasting educational value for onboarding or learning"
        - "Qualification: content is independent of any specific binding decision"
        - "Qualification: multiple valid approaches exist with genuine trade-offs worth explaining"
        - "Qualification: content would benefit someone learning the problem space"
        - Qualification test is applied before suggesting Concept creation

  - operation: add
    spec: knowledge-artifacts
    feature:
      id: concept-disqualification-criteria
      description: |
        Criteria that disqualify content from being a Concept document,
        even if it superficially discusses trade-offs or choices.
      acceptance_criteria:
        - "Disqualified: content is a binding decision record (that's an ADR)"
        - "Disqualified: content is a term or entity definition (that's Domain knowledge)"
        - "Disqualified: content is step-by-step instructions (that's a tutorial/how-to)"
        - "Disqualified: content is technical reference material (that's reference docs)"
        - "Disqualified: content is ephemeral discussion that won't matter in 6 months"
        - "Disqualified: content is specific to one project without generalizable insight"
        - Disqualification criteria are checked before suggesting Concept creation

  - operation: add
    spec: knowledge-artifacts
    feature:
      id: concept-documentation-type
      description: |
        Concept documents are classified as "Explanation" type documentation
        per the Diátaxis framework. This classification guides both creation
        and consumption of Concepts.
      acceptance_criteria:
        - Concepts are explicitly typed as Explanation documentation
        - "Explanation documentation characteristics: understanding-oriented, not task-oriented"
        - "Explanation documentation characteristics: answers 'why' not 'how'"
        - "Explanation documentation characteristics: permits reflection away from active work"
        - "Explanation documentation characteristics: can include labeled opinions and perspectives"
        - "Explanation documentation characteristics: makes connections across topics"
        - "Explanation documentation characteristics: provides context, history, and background"

  - operation: modify
    spec: knowledge-artifacts
    feature_id: concept-discovery
    description: |
      Replace signal-based detection with qualification-based detection.
      Instead of looking for phrases, apply a qualification test to determine
      if content is truly explanation-worthy.
    criteria:
      remove:
        - "Analyzes conversations for trade-off signals (comparisons, \"why we chose\", explaining reasoning)"
      add:
        - Applies Concept qualification test before suggesting Concept creation
        - "Qualification requires answering: is this understanding-oriented, not task-oriented?"
        - "Qualification requires answering: does this have lasting educational value?"
        - "Qualification requires answering: is this independent of a specific binding decision?"
        - Checks disqualification criteria before suggesting Concept creation
        - Only suggests Concept creation when qualification test passes

  - operation: modify
    spec: knowledge-artifacts
    feature_id: concept-template
    description: |
      Add required fields that reinforce the Explanation documentation type
      and ensure concepts meet qualification criteria.
    criteria:
      add:
        - Template includes required audience field describing who benefits from this understanding
        - Template includes required lasting_value field explaining why this matters long-term
        - "Template includes documentation_type field with value 'explanation' (per Diátaxis)"
      edit:
        - old: "Template suggests sections but does not enforce rigid structure"
          new: "Template suggests sections (Context, Approaches, Trade-offs, Our Perspective, When to Reconsider) but allows flexibility for explanation flow"
