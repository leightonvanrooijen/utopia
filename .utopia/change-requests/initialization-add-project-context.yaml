id: initialization-add-project-context
type: feature
title: Add project context to init with re-runnable support
status: draft
changes:
  # New spec for initialization concerns
  - operation: add
    spec: initialization
    spec_metadata:
      title: Project Initialization
      description: |
        The initialization system sets up Utopia on a project and manages
        project-level configuration in .utopia/config.yaml.
    feature:
      id: project-context-field
      description: |
        Config includes a project_context field - 1-2 sentences orienting
        AI assistants to the project's workflow and philosophy.
      acceptance_criteria:
        - Config struct has ProjectContext string field with yaml tag "project_context"
        - Init prompts "Project context (orient an AI to this project's workflow):"
        - Value is saved to .utopia/config.yaml under project_context key

  - operation: add
    spec: initialization
    feature:
      id: init-rerunnable
      description: |
        Running utopia init on an existing project prompts only for missing
        config fields, preserving existing values.
      acceptance_criteria:
        - Init detects existing .utopia/config.yaml
        - Only prompts for fields that are empty/missing
        - Preserves all existing config values
        - Prints which fields were added vs skipped

  # Enhancement to existing CR command
  - operation: modify
    spec: unified-change-request-system
    feature_id: cr-command
    criteria:
      add:
        - CR system prompt includes project_context from config
        - If project_context is empty, prints warning with instruction to run "utopia init" to add it
      remove:
        - Command prints helpful tips (e.g., watch command for live updates)
