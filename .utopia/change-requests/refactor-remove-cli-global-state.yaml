id: refactor-remove-cli-global-state
type: refactor
title: Remove global mutable state from CLI package
status: in-progress
tasks:
    - id: refactor-execute-registries
      description: |
        Remove global registry variables from cli/execute.go (lines 25-32):

          var (
              executeRegistry      *executeStrategy.Registry  // Global mutable
              executeChunkRegistry *chunkStrategy.Registry    // Global mutable
          )

        Instead, pass registries as parameters or use a command struct pattern.
        Flags can remain package-level for Cobra compatibility.
      acceptance_criteria:
        - Global executeRegistry variable removed
        - Global executeChunkRegistry variable removed
        - Registries passed via function parameters or struct
        - Command initialization receives registries explicitly
        - Multiple command instances possible (useful for testing)
        - All execute command functionality preserved
    - id: audit-other-global-state
      description: |
        Audit other CLI files for similar global mutable state patterns
        and refactor as needed.
      acceptance_criteria:
        - No global mutable registries in CLI package
        - State isolated to command execution scope
        - CLI commands become more testable
