id: refactor-split-cli-execute
type: refactor
title: Split cli/execute.go (1014 lines) into focused files
status: draft
tasks:
  - id: extract-execute-initiative
    description: |
      Extract initiative execution logic to cli/execute_initiative.go.
      This includes executeInitiative, executeSingleInitiative (after
      deduplication), and related helper functions.
    acceptance_criteria:
      - New file cli/execute_initiative.go created
      - All initiative-specific execution logic moved
      - File is ~200-250 lines (focused responsibility)
      - Main execute.go imports and uses the extracted code
      - All initiative execution still works

  - id: extract-execute-batch
    description: |
      Extract batch execution logic to cli/execute_batch.go.
      This includes runExecuteAll and related batch processing functions.
    acceptance_criteria:
      - New file cli/execute_batch.go created
      - Batch execution logic (~200 lines) moved
      - Progress tracking for multiple CRs contained here
      - All batch execution scenarios still work

  - id: extract-execute-git
    description: |
      Extract git operations to cli/execute_git.go.
      This includes gitCommitChunk, GitCommitCR, and related git helpers.
    acceptance_criteria:
      - New file cli/execute_git.go created
      - All git-related operations (~100 lines) moved
      - Git commit and branch operations contained here
      - All git operations still function correctly

  - id: extract-execute-merge
    description: |
      Extract auto-merge logic to cli/execute_merge.go (or consolidate
      with existing merge.go if appropriate).
      This includes autoMergeCR and related merge helpers.
    acceptance_criteria:
      - Auto-merge logic extracted to appropriate file
      - Clear separation between execute and merge concerns
      - Auto-merge after execution still works

  - id: slim-main-execute
    description: |
      After extractions, cli/execute.go should contain only:
      - Cobra command setup and flag definitions
      - Main runExecute entry point that orchestrates other modules
      - Strategy registry setup
    acceptance_criteria:
      - cli/execute.go reduced to ~150-200 lines
      - File focused on command setup and orchestration
      - All execute command functionality preserved
      - Code is more navigable and maintainable
