id: specs-remove-status-field
type: refactor
title: Remove status field from specs
status: in-progress
tasks:
    - id: remove-status-from-spec-files
      description: |
        Remove the `status` field from all existing spec YAML files.

        Specs represent the current state of the system (built from merged CRs),
        so a "draft" status is misleading - they are always the live truth.
      acceptance_criteria:
        - All spec files in .utopia/specs/ no longer have a status field
        - Existing behavior is preserved (specs still load and function correctly)
    - id: remove-status-from-code
      description: |
        Remove any code that reads, writes, or validates the spec status field.

        This includes struct fields, serialization, validation logic, and any
        business logic that references spec status.
      acceptance_criteria:
        - No code references spec status field
        - Spec loading/saving still works correctly
        - All existing tests pass without modification
    - id: update-templates-and-docs
      description: |
        Update any templates, documentation, or system prompts that reference
        spec status field.
      acceptance_criteria:
        - No templates generate specs with status field
        - No documentation mentions spec status
        - CR assistant system prompt (if applicable) doesn't reference spec status
