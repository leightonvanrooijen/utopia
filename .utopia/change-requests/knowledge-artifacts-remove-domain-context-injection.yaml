id: knowledge-artifacts-remove-domain-context-injection
type: removal
title: Remove domain context injection from code generation
status: in-progress
changes:
    - operation: remove
      spec: knowledge-artifacts
      feature_id: domain-context-injection
      reason: |
        Domain docs should be human-focused documentation, not Claude context injection.

        Rationale:
        - Claude discovers entity relationships naturally through code (imports, type definitions, function signatures)
        - Definitions are already truncated to 150 chars, providing marginal value
        - Aliases for terminology correction have limited impact vs context cost
        - Injecting domain context adds ~7,000-10,000 tokens overhead per WorkItem prompt
        - Removing injection simplifies the system and makes prompts leaner

        Domain docs remain valuable as human-focused documentation for:
        - Onboarding new team members
        - Establishing shared ubiquitous language for communication
        - Glossary for humans reading the codebase

        Code to remove:
        - internal/cli/context.go: buildDomainContext() function
        - internal/cli/context_test.go: associated tests
        - internal/cli/execute.go: SetDomainContext calls (lines 338-342, 405-409)
        - internal/cli/cr.go: buildDomainContext call (line 287)
        - internal/strategies/chunk/ralphsequential/strategy.go: DomainContext field and SetDomainContext method
        - internal/strategies/chunk/ralphsequential/prompt.go: DomainContext from template and PromptData
