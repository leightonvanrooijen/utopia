id: refactor-move-yaml-marshaling
type: refactor
title: Move YAML marshaling logic from domain to storage layer
status: in-progress
tasks:
    - id: move-feature-marshaling
      description: |
        Move the MarshalYAML method from domain.Feature (domain/spec.go lines 38-75)
        to the storage layer. Domain types should be serialization-agnostic.

        Current problem: Domain package imports yaml.v3 and contains 40 lines
        of YAML node manipulation, violating clean architecture principles.

        Solution: Create custom marshaling wrapper in storage layer that handles
        the block-style YAML output requirement without polluting domain.
      acceptance_criteria:
        - MarshalYAML removed from domain.Feature type
        - domain package no longer imports gopkg.in/yaml.v3
        - Storage layer handles Feature serialization with block style
        - YAML output format unchanged (block style preserved)
        - All spec save/load operations work correctly
        - Domain types are now infrastructure-independent
    - id: verify-no-other-marshaling
      description: |
        Audit domain package for any other serialization-specific code
        and move to appropriate infrastructure layer if found.
      acceptance_criteria:
        - No yaml/json marshal methods in domain types (except simple tags)
        - Domain package focused purely on business logic
        - All serialization concerns in infra/storage
