id: unified-change-request-system-add-notes-capture
type: feature
title: Add notes capture during CR creation
status: in-progress
changes:
    - operation: add
      spec: unified-change-request-system
      feature:
        id: notes-capture
        description: |
            Allow capturing notes during CR creation conversations for ideas that
            should be remembered but aren't part of the current work.

            Notes are saved to .utopia/notes/ as markdown files with descriptive
            names. The format is intentionally loose — just a place to dump thoughts
            for later.
        acceptance_criteria:
            - Notes folder location is .utopia/notes/
            - CR assistant system prompt includes guidance on saving notes to the notes folder
            - Notes are saved as markdown files with descriptive filenames
