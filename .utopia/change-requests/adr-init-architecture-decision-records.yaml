id: adr-init-architecture-decision-records
type: initiative
title: Add Architecture Decision Record Support
status: in-progress
phases:
    - type: enhancement
      status: complete
      changes:
        - operation: modify
          spec: unified-change-request-system
          feature_id: cr-lifecycle
          description: |
            Extend CR lifecycle to auto-commit on validation.
            When a CR passes YAML validation, it is immediately git-committed.
            This provides a commit SHA that can be referenced by conversation capture.
          criteria:
            add:
                - CR is git-committed immediately after passing validation
                - 'Commit message follows pattern "cr: create {cr-id}"'
                - Commit SHA is available for linking in conversation metadata
    - type: feature
      status: complete
      changes:
        - operation: add
          spec: adr
          feature:
            id: conversation-persistence
            description: |
                Automatically persist session transcripts at Utopia level.
                Captures full context needed for later ADR discovery.
            acceptance_criteria:
                - Utopia captures full transcript at session end
                - Capture happens at Utopia level (not Claude hooks) for reliability
                - Cannot be bypassed via Ctrl+C
                - Conversations stored in .utopia/conversations/
                - Metadata includes session timestamp and branch name
                - Metadata includes list of CRs created during session (with commit SHAs)
                - Metadata includes list of commits made during session
                - Conversations marked as unprocessed until reviewed by /adr
    - type: feature
      status: in-progress
      changes:
        - operation: add
          spec: adr
          feature:
            id: adr-discovery
            description: |
                /adr command that scans persisted conversations for architectural
                decisions and guides the user through ADR creation conversationally.
            acceptance_criteria:
                - /adr command scans .utopia/conversations/ for unprocessed conversations
                - Analyzes each conversation for architectural decision signals
                - Cross-references with commits and spec changes for context
                - Guides user through ADR creation conversationally (like /cr)
                - Marks conversations as processed after review
        - operation: add
          spec: adr
          feature:
            id: adr-template
            description: |
                ADR document structure based on Nygard format with extensions.
            acceptance_criteria:
                - ADRs stored in .utopia/adrs/ as YAML files
                - ADR ID format is sequential (ADR-001, ADR-002, etc.)
                - Template includes Title field (ID + decision statement)
                - Template includes Status field (draft, proposed, accepted, deprecated, superseded)
                - Template includes Context field (forces at play - technical, political, social)
                - Template includes Decision field (active voice, "We will...")
                - Template includes Options Considered field (alternatives with pros/cons)
                - Template includes Consequences field (positive, negative, and neutral outcomes)
                - Template includes Advice field (who was consulted, when)
                - Template includes Principles field (architectural principles that apply or conflict)
        - operation: add
          spec: adr
          feature:
            id: adr-lifecycle
            description: |
                Manage ADR status transitions over time.
            acceptance_criteria:
                - ADRs can transition from draft to proposed
                - ADRs can transition from proposed to accepted
                - ADRs can be marked deprecated with reason
                - ADRs can be marked superseded with reference to replacement ADR
                - Status changes are tracked with timestamp
current_phase: 2
