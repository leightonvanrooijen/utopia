description: ""
features:
    - id: harvest-command
      description: |
        /harvest command that performs single-pass analysis of unprocessed
        conversations, detecting signals for all documentation types and
        guiding creation with context flowing between doc types.
      acceptance_criteria:
        - /harvest command scans .utopia/conversations/ for unprocessed conversations
        - Single pass detects ADR signals, Concept signals, and Domain signals
        - Results grouped by type with confidence indicators
        - Shows count of signals found per type (e.g., "2 ADR signals, 1 Concept signal")
        - Cross-references existing docs to avoid suggesting duplicates
        - User can select which docs to create (individual, multiple, or all)
        - Context flows between creations (ADR created first is known when creating Concept)
        - Created docs can reference each other (e.g., Concept links to related ADR)
        - Conversation marked processed only after user completes or exits harvest
        - Skipped signals can be revisited in future harvests
        - README signals included in harvest output alongside ADR/Concept/Domain signals
        - Shows count of README signals found (e.g., "1 README signal")
        - README signals grouped separately in results display

    - id: signal-detection
      description: |
        Unified signal detection that identifies documentation opportunities
        across all types in a single conversation scan.
      acceptance_criteria:
        - ADR signals detected (decision language, "we chose", "decided to", alternatives discussed)
        - Concept signals detected (trade-off explanations, "why we chose", teaching moments)
        - Domain signals detected (term definitions, entity relationships, "X means Y")
        - Each signal includes source location (conversation ID, approximate message range)
        - Signals tagged with confidence level (high/medium/low)
        - Related signals linked (e.g., decision + its explanation + new terms it introduces)

    - id: duplicate-detection
      description: |
        Check existing documentation before suggesting new docs to avoid
        duplication and suggest updates instead.
      acceptance_criteria:
        - Scans existing ADRs in .utopia/adrs/ before suggesting new ADR
        - Scans existing Concepts in .utopia/concepts/ before suggesting new Concept
        - Scans existing Domain docs in .utopia/domain/ before suggesting new terms
        - If related doc exists, suggests "update existing" instead of "create new"
        - Shows which existing doc would be updated

    - id: readme-signal-detection
      description: |
        Detects spec features that qualify for README documentation using strict
        criteria. Only surfaces signals for user-facing, primary workflow elements.

        Qualification criteria (must meet at least one):
        - New primary CLI command (not flags, not internal)
        - New knowledge artifact type (alongside ADR/Concept/Domain)
        - Change to core workflow/loop
        - New top-level .utopia/ directory users interact with

        Disqualification criteria (any of these excludes):
        - Enhancement to existing feature (README already covers it)
        - Internal implementation detail
        - Config options (too granular)
        - Spec-only changes with no user workflow impact
      acceptance_criteria:
        - Scans specs for features matching strict README qualification criteria
        - Parses existing README to extract documented commands, artifacts, and structure
        - Only signals features that qualify AND are not already in README
        - Each signal includes suggested README section based on content type
        - Each signal includes confidence level (high/medium/low)
        - Output is conversational matching other harvest signals
        - Signals include the source spec and feature ID

    - id: readme-detection-strategy
      description: |
        Pluggable strategy for how README signals are detected. Default strategy
        uses README comparison (scan README vs specs). Can be replaced with
        alternative strategies like git-diff-based detection.
      acceptance_criteria:
        - Detection logic is encapsulated behind a strategy interface
        - Default strategy is comparison-based (README vs specs)
        - Strategy can be swapped without changing harvest command flow
        - Strategy receives parsed README structure and current specs as input
        - Strategy returns list of README signals with confidence and suggested section
