id: refactoring
title: Refactoring System
status: draft
description: |
  The refactoring system provides an AI-guided workflow for creating refactor
  documents. Users run `utopia refactor` and Claude guides them through defining
  code restructuring tasks.

  Key characteristics:
  - Refactors are standalone (not linked to specs)
  - Refactors change HOW code is structured, not WHAT it does
  - Behavior preservation is enforced at system level (in Ralph prompt)
  - Lifecycle is created -> deleted (no archive)
  - Reuses Ralph execution infrastructure with refactor mode

domain_knowledge:
  - Refactors are an implementation concern, orthogonal to specs
  - Specs define WHAT (capabilities), refactors define HOW (structure)
  - The defining constraint of refactoring is behavior must not change
  - Scope is discovered during implementation, not defined upfront
  - Refactors are deleted after completion (temporary work artifacts)
  - Refactor tasks need acceptance criteria for Ralph execution
  - The chunker injects behavior-preservation constraints for refactors

features:
  - id: refactor-document-structure
    description: |
      Define the structure of a refactor document.
      Minimal structure focused on tasks with acceptance criteria.
    acceptance_criteria:
      - Refactor has id field (kebab-case identifier)
      - Refactor has title field (human readable description)
      - Refactor has status field (draft, ready, in-progress, complete)
      - Refactor has tasks array
      - Each task has id, description, and acceptance_criteria fields
      - Refactor does NOT have scope field (discovered during implementation)
      - Refactor does NOT have constraints field (system-level enforcement)
      - Refactor does NOT have triggered_by or parent_spec field (standalone)

  - id: refactor-storage
    description: |
      Define where refactor documents are stored.
    acceptance_criteria:
      - Refactors are stored in .utopia/refactors/ directory
      - File naming is <refactor-id>.yaml
      - Draft refactors go directly to .utopia/refactors/ (no _drafts subdirectory)
      - Directory is created if it does not exist

  - id: refactor-command
    description: |
      CLI command to create refactors via AI-guided conversation.
      Same flow as utopia spec but for refactors.
    acceptance_criteria:
      - Command is "utopia refactor"
      - Command starts an AI-guided session
      - Claude guides user through defining refactor tasks
      - Claude asks one question at a time
      - Claude captures tasks with specific, testable acceptance criteria
      - Output is written to .utopia/refactors/<refactor-id>.yaml
      - Command prints helpful tips (e.g., watch command for live updates)

  - id: refactor-lifecycle
    description: |
      Define the lifecycle of a refactor document.
    acceptance_criteria:
      - Refactors are created in draft status
      - Refactors can transition to ready, in-progress, complete
      - Completed refactors are deleted (not archived)
      - Deletion happens after successful execution and verification

  - id: refactor-yaml-validation
    description: |
      Validate generated refactor YAML after session ends.
    acceptance_criteria:
      - Refactor files are validated after session
      - Validation checks YAML syntax and required fields (id, title, status, tasks)
      - Each task must have id, description, and at least one acceptance criterion
      - If validation fails, error message is displayed
      - A fix session is started automatically on validation failure

  - id: behavior-preservation-constraint
    description: |
      System-level constraint injected into Ralph prompts for refactors.
      Ensures all refactors preserve existing behavior.
    acceptance_criteria:
      - Constraint text includes "This is a refactor. Existing behavior MUST be preserved."
      - Constraint text includes "All existing tests must pass without modification"
      - Constraint is automatically injected for all refactor WorkItems
      - Constraint appears in CONSTRAINTS section of the prompt template
      - Constraint is not stored in the refactor document itself
