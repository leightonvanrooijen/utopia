description: ""
features:
    - id: discover-command
      description: |
        Scans the entire codebase to discover existing system behavior and
        propose draft specs. Uses Claude to analyze code, tests, docs, and
        comments to identify features and their boundaries.
      acceptance_criteria:
        - Command `utopia discover` initiates codebase analysis
        - Claude receives codebase context (code, tests, docs, comments)
        - Output is draft specs saved to `.utopia/drafts/` directory
        - Each draft spec includes confidence level (high/medium/low)
        - Confidence based on evidence quality (tests exist, clear boundaries, documentation)
        - Low confidence specs include uncertainty notes explaining what's unclear
        - Discovery completes with summary of drafts created

    - id: drafts-storage
      description: |
        Stores proposed specs in a drafts directory until validated.
        Drafts are not used by the system until promoted to specs.
      acceptance_criteria:
        - Draft specs stored in `.utopia/drafts/` directory
        - Draft spec format matches spec format with additional `confidence` field
        - Drafts include `discovered_from` field listing source files analyzed
        - Drafts directory created by `utopia discover` if it doesn't exist

    - id: shape-command
      description: |
        Guided conversation flow for validating and refining draft specs.
        Walks through each draft, asking clarifying questions about intent,
        and updating specs based on user responses.
      acceptance_criteria:
        - Command `utopia shape` starts guided validation flow
        - Presents drafts one at a time, starting with lowest confidence
        - For each draft, Claude asks about uncertain areas
        - User confirms, corrects, or rejects each proposed feature
        - Corrections update the spec to match stated intent
        - Rejected features are removed from the draft

    - id: spec-promotion
      description: |
        Moves validated drafts from `.utopia/drafts/` to `.utopia/specs/`.
        Removes draft-specific fields during promotion.
      acceptance_criteria:
        - After shaping conversation, user can promote draft to spec
        - Promotion moves file from `drafts/` to `specs/`
        - Promotion removes `confidence` and `discovered_from` fields
        - 'Promoted spec has `status: active`'
        - Original draft is deleted after successful promotion

    - id: incremental-discovery
      description: |
        Re-running discover after codebase changes only analyzes new or
        modified files. Avoids re-processing unchanged code and allows
        discovery to evolve with the codebase.
      acceptance_criteria:
        - Discovery tracks last run timestamp in `.utopia/drafts/.discovery-state`
        - Subsequent `utopia discover` compares file modification times to last run
        - Only files modified since last discovery are analyzed
        - New drafts are created for newly discovered features
        - Existing drafts for unchanged code are preserved
        - Flag `--full` forces complete re-discovery of entire codebase

    - id: discovery-scope-flags
      description: |
        Command-line flags to limit discovery scope to specific directories
        or file patterns. Useful for large codebases or focusing on specific
        modules during adoption.
      acceptance_criteria:
        - Flag `--path <dir>` limits discovery to specific directory
        - Multiple `--path` flags can be provided for multiple directories
        - Flag `--exclude <pattern>` excludes files matching glob pattern
        - Default (no flags) discovers entire codebase
        - Scope restrictions are recorded in draft metadata for context
