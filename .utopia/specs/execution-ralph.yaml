id: execution-ralph
title: Ralph Execution Loop
status: draft
created: 0001-01-01T00:00:00Z
updated: 2026-01-28T08:58:42.002705+11:00
description: |
    The Ralph execution loop runs WorkItems produced by the chunker.

    Key characteristics:
    - Utopia controls the loop (not Claude stop hooks)
    - Fresh context each iteration
    - Retries until success or human intervention (Ctrl+C)
    - Optional max iterations as safety net
    - Sequential execution, resumes from where it left off

    Depends on: verification (for running verification commands)
domain_knowledge:
    - Each iteration is a fresh Claude context; state is rebuilt from git/files
    - The <COMPLETE> token distinguishes intentional completion from step-limit exits
    - Only inject failures from previous iteration (not accumulated history)
    - Human oversight assumed; user can Ctrl+C if loop is stuck
    - Backpressure via verification replaces explicit direction
    - Timeout applies to entire execution session, not per-WorkItem
    - Timeout timer starts when execution begins, not when each WorkItem starts
features:
    - id: ralph-loop
      description: |
        Core loop that runs a single WorkItem until completion.
      acceptance_criteria:
        - Loop invokes Claude Code via CLI (claude --print --prompt "...")
        - Loop checks Claude output for <COMPLETE> token
        - If no token, retry immediately (step limit or stuck)
        - If token present, run verification (via verification system)
        - If verification passes, mark WorkItem completed
        - If verification fails, capture output, rebuild prompt with failures, retry
        - Loop continues until success or max iterations (if configured)
        - Loop logs each iteration (attempt N, token found, verification result)

    - id: failure-injection
      description: |
        Inject failure output into prompt for retry iterations.
      acceptance_criteria:
        - First iteration has no PREVIOUS FAILURES section
        - Subsequent iterations include PREVIOUS FAILURES with verification output
        - Only failures from immediately previous iteration (not accumulated)
        - Failures are injected as raw text in code block

    - id: work-item-status
      description: |
        Track WorkItem status through execution.
      acceptance_criteria:
        - Status values are pending, in_progress, completed
        - Status persisted to .utopia/work-items/<spec-id>/<item-id>.yaml
        - Completed status includes iteration count
        - In-progress status includes current iteration count

    - id: sequential-executor
      description: |
        Execute WorkItems in order, one at a time.
      acceptance_criteria:
        - Loads WorkItems for a spec, sorted by Order
        - Skips items with status "completed"
        - Executes items sequentially (waits for completion before next)
        - Stops if max iterations reached on any item
        - Continues from first non-completed item on resume

    - id: execute-command
      description: |
        Execute command internally calls the chunking strategy before running
        WorkItems. Users provide a spec or CR as input, and execute handles
        both chunking, execution, and spec merging.
      acceptance_criteria:
        - Command is "utopia execute <spec-id>"
        - Command loads WorkItems from .utopia/work-items/<spec-id>/
        - Command prints progress (executing item N of M, iteration K)
        - Command prints when item completes
        - Command handles Ctrl+C gracefully (saves current state)
        - On max iterations, prints message and exits
        - Execute command accepts a spec or CR as input
        - Execute internally invokes the chunking strategy to produce WorkItems
        - Execute runs the produced WorkItems through the Ralph loop
        - Users only need to run a single command for the full flow
        - Execute command with no arguments lists available CRs from .utopia/change-requests/
        - List displays CR titles
        - User can select a CR interactively
        - Selected CR is passed to execution flow
        - Initiative phases execute continuously without stopping between phases
        - After a phase completes, execution automatically proceeds to the next phase
        - User can still Ctrl+C to stop at any time (existing behavior preserved)
        - Final message only appears after all phases complete (not between phases)
        - After all WorkItems for a CR complete successfully, automatically merge the CR into specs
        - Merge is performed as a separate git commit with message indicating it's a spec merge
        - Separate commit enables easy rollback if work needs to be retried (git revert)
        - Merge uses existing merge logic from unified-change-request-system
        - If merge fails, error is displayed but WorkItem completion state is preserved

    - id: streaming-output
      description: |
        Stream Claude output in real-time during execution using --verbose flag.
      acceptance_criteria:
        - Claude CLI invoked with --verbose flag to show real-time output
        - Output streams to terminal as Claude works (user sees progress)
        - Output is still captured for completion token detection
        - Works with both stdout and stderr streams
        - Streaming does not interfere with Ctrl+C handling

    - id: timeout-flag
      description: Add --timeout flag that accepts duration in minutes
      acceptance_criteria:
        - Flag accepts a positive integer representing minutes (e.g., --timeout 30)
        - Flag is optional with no default (executions run indefinitely by default)
        - Invalid values (negative, zero, non-numeric) produce clear error message
        - Flag is added to the "utopia execute <spec-id>" command

    - id: timeout-trigger
      description: Trigger graceful shutdown when session timeout is reached
      acceptance_criteria:
        - Execution stops after specified minutes have elapsed from session start
        - Shutdown uses same code path as Ctrl+C (existing persistence mechanism)
        - In-progress WorkItem state is saved and can be resumed
        - Timer continues across WorkItem boundaries (not reset per item)

    - id: timeout-notification
      description: Notify user when timeout occurs
      acceptance_criteria:
        - Terminal displays clear message indicating timeout was reached
        - Message includes total session duration
        - Message indicates that progress was saved and can be resumed
        - Message differs from normal completion (user knows it was timeout, not success)
